version: '3.8'

services:
  company-rag:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: company-knowledgebase-rag
    ports:
      - "8501:8501"
    volumes:
      # Persist data directories and logs to the host machine
      - ../data:/app/data
      - ../logs:/app/logs
    env_file:
      - ../.env
    restart: unless-stopped
